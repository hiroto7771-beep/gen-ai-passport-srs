      </div>` : ''}

      <div class="divider"></div>
      <div class="detail-stat-card">
        <span class="detail-stat-card__label">次回出題</span>
        <span class="detail-stat-card__value">${formatNextReview(cs)}</span>
      </div>
      <div class="detail-stat-card">
        <span class="detail-stat-card__label">連続成功回数</span>
        <span class="detail-stat-card__value">${cs.reps} 回</span>
      </div>
      <div class="detail-stat-card">
        <span class="detail-stat-card__label">Easiness Factor</span>
        <span class="detail-stat-card__value">${cs.ef.toFixed(2)}</span>
      </div>
      <div class="detail-stat-card">
        <span class="detail-stat-card__label">作成日</span>
        <span class="detail-stat-card__value">${formatDate(card.createdAt)}</span>
      </div>

      <div class="divider"></div>
      <button class="btn-danger" onclick="deleteCard('${card.id}')">
        <svg class="icon" width="16" height="16" style="margin-right:6px;"><use href="#icon-trash"/></svg>
        このカードを削除
      </button>
      <div style="height:24px;"></div>`;
  } else {
    editingTags = [...card.tags];

    const chapterOptions = CHAPTERS.map(ch =>
      `<option value="${ch.id}" ${ch.id === card.chapter ? 'selected' : ''}>${ch.name}</option>`
    ).join('');

    container.innerHTML = `
      <div class="form-group">
        <label class="form-label form-label--required">章</label>
        <select class="input-field" id="edit-chapter">${chapterOptions}</select>
      </div>
      <div class="form-group">
        <label class="form-label">タグ</label>
        <div class="tag-input-area" id="tag-input-area-edit" onclick="document.getElementById('tag-text-input-edit').focus()">
          <input class="tag-text-input" id="tag-text-input-edit"
            placeholder="タグを入力してEnter"
            oninput="renderTagSuggestionsEdit()"
            onkeydown="handleTagKeydownEdit(event)">
        </div>
        <div class="tag-suggestions" id="tag-suggestions-edit"></div>
      </div>
      <div class="form-group">
        <label class="form-label form-label--required">Q. 質問</label>
        <textarea class="input-field textarea-field textarea-field--large"
          id="edit-front" maxlength="500">${escapeHtml(card.front)}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label form-label--required">A. 答え</label>
        <textarea class="input-field textarea-field"
          id="edit-back" maxlength="500">${escapeHtml(card.back)}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">補足説明（任意）</label>
        <textarea class="input-field textarea-field textarea-field--large"
          id="edit-note" maxlength="2000">${escapeHtml(card.note || '')}</textarea>
      </div>`;

    renderTagChipsInEdit();
    renderTagSuggestionsEdit();
  }
}

/* タグ操作（編集モード用） */
function handleTagKeydownEdit(e) {
  const input = e.target;
  if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
    e.preventDefault();
    addTagEdit(input.value.trim());
    input.value = '';
    renderTagSuggestionsEdit();
  }
  if (e.key === 'Backspace' && input.value === '' && editingTags.length > 0) {
    editingTags.pop();
    renderTagChipsInEdit();
  }
}

function addTagEdit(tag) {
  const normalized = tag.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-　-鿿゠-ヿ぀-ゟ]/g, '');
  if (!normalized || editingTags.includes(normalized)) return;
  editingTags.push(normalized);
  renderTagChipsInEdit();
}

function removeTagEdit(idx) {
  editingTags.splice(idx, 1);
  renderTagChipsInEdit();
}

function renderTagChipsInEdit() {
  const area  = document.getElementById('tag-input-area-edit');
  const input = document.getElementById('tag-text-input-edit');
  if (!area || !input) return;
  area.querySelectorAll('.tag-chip').forEach(el => el.remove());
  editingTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${escapeHtml(t)}<button class="tag-chip__remove" onclick="removeTagEdit(${i})" aria-label="${escapeHtml(t)}を削除">×</button>`;
    area.insertBefore(chip, input);
  });
}

function renderTagSuggestionsEdit() {
  const inputEl = document.getElementById('tag-text-input-edit');
  const query   = inputEl ? inputEl.value.trim().toLowerCase() : '';
  const used    = getAllUsedTags(state.cards);
  const filtered = used
    .filter(t => !editingTags.includes(t) && (query === '' || t.includes(query)))
    .slice(0, 12);

  const container = document.getElementById('tag-suggestions-edit');
  if (!container) return;
  container.innerHTML = '';
  filtered.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag-suggestion-chip';
    btn.textContent = t;
    btn.onclick = () => {
      addTagEdit(t);
      document.getElementById('tag-text-input-edit').value = '';
      renderTagSuggestionsEdit();
    };
    container.appendChild(btn);
  });
}

function saveEditedCard() {
  const chapter = document.getElementById('edit-chapter').value;
  const front   = document.getElementById('edit-front').value.trim();
  const back    = document.getElementById('edit-back').value.trim();
  const note    = document.getElementById('edit-note').value.trim();

  if (!front) { showToast('Q.（質問）を入力してください', 'error'); return; }
  if (!back)  { showToast('A.（答え）を入力してください', 'error'); return; }

  const idx = state.cards.findIndex(c => c.id === detailCardId);
  if (idx === -1) return;

  state.cards[idx] = {
    ...state.cards[idx],
    chapter, tags: [...editingTags], front, back, note,
    updatedAt: Date.now()
  };
  saveState();

  detailEditMode = false;
  document.getElementById('btn-edit-toggle').textContent = '編集';
  document.getElementById('detail-overlay-title').textContent = 'カード詳細';
  renderCardDetail();
  renderCards();
  showToast('カードを更新しました', 'success');
}

function deleteCard(cardId) {
  const card = state.cards.find(c => c.id === cardId);
  if (!card) return;
  const ok = confirm(`「${card.front.slice(0, 30)}...」を削除します。よろしいですか？`);
  if (!ok) return;

  state.cards      = state.cards.filter(c => c.id !== cardId);
  state.cardStates = state.cardStates.filter(cs => cs.cardId !== cardId);
  state.stats.totalCards = state.cards.length;
  saveState();

  document.getElementById('card-detail-overlay').style.display = 'none';
  detailCardId   = null;
  detailEditMode = false;
  renderCards();
  showToast('カードを削除しました');
}

/* ===== エクスポート / インポート ===== */

function exportData() {
  const payload = {
    exportedAt: Date.now(),
    appVersion: "1.0",
    data: state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `srs-backup-${formatDate(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('エクスポートしました', 'success');
}

function triggerImport() {
  document.getElementById('import-file-input').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.data || !payload.data.version) {
        showToast('無効なファイル形式です', 'error');
        return;
      }
      if (payload.data.version !== "1.0") {
        showToast('対応していないバージョンです', 'error');
        return;
      }
      const ok = confirm('現在のデータをインポートデータで完全に上書きします。よろしいですか？');
      if (!ok) return;
      saveState(payload.data);
      location.reload();
    } catch (err) {
      showToast('読み込みに失敗しました', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  const ok = confirm('すべての学習データを削除します。この操作は取り消せません。よろしいですか？');
  if (!ok) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* ===== セキュリティユーティリティ ===== */

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ===== カード検索 (FR-14) ===== */

let searchActive = false;
let searchQuery  = '';

function toggleSearch() {
  searchActive = !searchActive;
  const wrap  = document.getElementById('search-bar-wrap');
  const input = document.getElementById('search-input');
  wrap.classList.toggle('visible', searchActive);
  if (searchActive) {
    searchQuery = '';
    input.value = '';
    document.getElementById('search-result-count').textContent = '';
    document.getElementById('search-clear-btn').style.display = 'none';
    setTimeout(() => input.focus(), 100);
  } else {
    searchQuery = '';
    renderCards();
  }
}

function onSearchInput() {
  const input = document.getElementById('search-input');
  searchQuery = input.value.trim();
  document.getElementById('search-clear-btn').style.display = searchQuery ? 'flex' : 'none';
  renderCards();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  document.getElementById('search-result-count').textContent = '';
  document.getElementById('search-input').focus();
  renderCards();
}

function searchCards(cards, query) {
  if (!query) return cards;
  const q = query.toLowerCase();
  return cards.filter(c =>
    c.front.toLowerCase().includes(q) ||
    c.back.toLowerCase().includes(q)  ||
    (c.note && c.note.toLowerCase().includes(q)) ||
    c.tags.some(t => t.toLowerCase().includes(q))
  );
}

/* ===== 音声入力 (FR-13) ===== */

let currentRecognition = null;

function startVoiceInput(targetId, btnId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('お使いのブラウザは音声入力に対応していません', 'error');
    return;
  }

  const btn = document.getElementById(btnId);

  if (currentRecognition) {
    currentRecognition.stop();
    currentRecognition = null;
    if (btn) { btn.classList.remove('recording'); btn.childNodes[1].textContent = '音声入力'; }
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;
  currentRecognition = recognition;

  if (btn) { btn.classList.add('recording'); btn.childNodes[1].textContent = '録音中…'; }
  showToast('音声を認識中です…');

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    const target = document.getElementById(targetId);
    if (target) {
      const cur = target.value;
      target.value = cur ? cur + (cur.endsWith('。') || cur.endsWith('、') ? '' : '') + text : text;
      target.focus();
    }
    showToast('音声を認識しました', 'success');
  };

  recognition.onerror = e => {
    const msgs = { 'no-speech': '音声が検出されませんでした', 'not-allowed': 'マイクの使用が許可されていません' };
    showToast(msgs[e.error] || '音声認識に失敗しました', 'error');
  };

  recognition.onend = () => {
    currentRecognition = null;
    if (btn) { btn.classList.remove('recording'); btn.childNodes[1].textContent = '音声入力'; }
  };

  recognition.start();
}

/* ===== キーボードショートカット ===== */

document.addEventListener('keydown', e => {
  const overlay = document.getElementById('session-overlay');
  if (!overlay || overlay.style.display === 'none') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (!session.answerShown) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); showAnswer(); }
  } else {
    if (e.key === '1') rateCard(0);
    if (e.key === '2') rateCard(1);
    if (e.key === '3') rateCard(2);
  }
});

/* ===== 初期化 ===== */

(function init() {
  state = loadState();

  // currentView が cards/profile なら home に戻す（セッション中断リロード対策）
  const validViews = ['home', 'cards', 'profile'];
  if (!validViews.includes(state.currentView)) state.currentView = 'home';

  // stats の totalCards が実際のカード数と乖離していたら修正
  if (state.stats.totalCards !== state.cards.length) {
    state.stats.totalCards = state.cards.length;
  }

  // 未完了セッションがあれば endedAt を補完
  state.sessions.forEach(s => {
    if (!s.endedAt) s.endedAt = s.startedAt;
  });

  const view = state.currentView;
  document.querySelectorAll('.bottom-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.id === 'view-' + view);
  });

  renderView(view);
  saveState();

  // 期限超過カードがあれば起動時にトースト通知
  const overdueCount = state.cardStates.filter(cs =>
    cs.nextReviewAt < new Date().setHours(0,0,0,0) && cs.reps > 0
  ).length;
  if (overdueCount > 0) {
    setTimeout(() => showToast(`期限超過カードが ${overdueCount} 枚あります`, 'warning'), 500);
  }
})();
</script>
