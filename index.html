/* ===== グローバル状態 ===== */
let state = null;

/* ===== localStorage ラッパー ===== */

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      const s = structuredClone(INITIAL_STATE);
      s.categories = DEFAULT_CATEGORIES.map(c => ({ ...c }));
      s.cards = DEFAULT_CARDS.map(c => ({ ...c }));
      s.cardStates = DEFAULT_CARDS.map(c => ({
        cardId: c.id, ef: 2.5, interval: 0, reps: 0,
        nextReviewAt: c.createdAt, lastReviewedAt: null
      }));
      s.stats.totalCards = DEFAULT_CARDS.length;
      return s;
    }
    let parsed = JSON.parse(raw);
    if (parsed.version !== "2.0") parsed = migrate(parsed);
    // DEFAULT_CARDSのうちまだ存在しないカードをマージする
    const existingIds = new Set(parsed.cards.map(c => c.id));
    const newCards = DEFAULT_CARDS.filter(c => !existingIds.has(c.id));
    if (newCards.length > 0) {
      parsed.cards = parsed.cards.concat(newCards.map(c => ({ ...c })));
      parsed.cardStates = parsed.cardStates.concat(newCards.map(c => ({
        cardId: c.id, ef: 2.5, interval: 0, reps: 0,
        nextReviewAt: c.createdAt, lastReviewedAt: null
      })));
      parsed.stats.totalCards = parsed.cards.length;
    }
    return parsed;
  } catch (e) {
    console.error('Failed to load state:', e);
    const s = structuredClone(INITIAL_STATE);
    s.categories = DEFAULT_CATEGORIES.map(c => ({ ...c }));
    return s;
  }
}

function saveState(s) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s || state));
    return true;
  } catch (e) {
    console.error('Failed to save state:', e);
    showToast('保存に失敗しました', 'error');
    return false;
  }
}

function migrate(oldState) {
  // v1.0 → v2.0: categories/decks/tags をstateに移行
  if (!oldState.version || oldState.version === "1.0") {
    return {
      ...oldState,
      version: "2.0",
      categories: DEFAULT_CATEGORIES.map(c => ({ ...c })),
      decks: oldState.decks || [],
      tags: oldState.tags || [],
      settings: {
        ...oldState.settings,
        activeDeckId: null
      }
    };
  }
  return oldState;
}

/* ===== SRS アルゴリズム ===== */

function reviewCard(cardState, rating) {
  const now = Date.now();
  const DAY_MS = 24 * 60 * 60 * 1000;
  const MIN_DELAY_MS = 10 * 60 * 1000;

  const s = { ...cardState, lastReviewedAt: now };

  if (rating === 0) {
    s.ef = Math.max(1.3, cardState.ef - 0.20);
    s.reps = 0;
    s.interval = 0;
    s.nextReviewAt = now + MIN_DELAY_MS;
  } else if (rating === 1) {
    if (cardState.reps === 0)      s.interval = 1;
    else if (cardState.reps === 1) s.interval = 3;
    else                           s.interval = Math.round(cardState.interval * cardState.ef);
    s.reps = cardState.reps + 1;
    s.nextReviewAt = now + s.interval * DAY_MS;
  } else if (rating === 2) {
    s.ef = Math.min(2.8, cardState.ef + 0.10);
    if (cardState.reps === 0)      s.interval = 3;
    else if (cardState.reps === 1) s.interval = 7;
    else                           s.interval = Math.round(cardState.interval * cardState.ef * 1.3);
    s.reps = cardState.reps + 1;
    s.nextReviewAt = now + s.interval * DAY_MS;
  }

  return s;
}

function calculateInterval(cardState, rating) {
  if (rating === 1) {
    if (cardState.reps === 0) return 1;
    if (cardState.reps === 1) return 3;
    return Math.round(cardState.interval * cardState.ef);
  }
  if (rating === 2) {
    if (cardState.reps === 0) return 3;
    if (cardState.reps === 1) return 7;
    return Math.round(cardState.interval * (cardState.ef + 0.10) * 1.3);
  }
  return 0;
}

function previewIntervals(cardState) {
  return {
    forgotten: "10分後",
    normal: formatInterval(calculateInterval(cardState, 1)),
    easy:   formatInterval(calculateInterval(cardState, 2))
  };
}

function formatInterval(days) {
  if (days < 1)  return "10分後";
  if (days === 1) return "1日後";
  if (days < 7)  return `${days}日後`;
  if (days < 30) return `${Math.round(days / 7)}週間後`;
  return `${Math.round(days / 30)}ヶ月後`;
}

function getCardStatus(cs) {
  if (cs.reps === 0 && cs.lastReviewedAt === null) return "new";
  if (cs.reps >= 3 && cs.ef >= 2.5) return "mastered";
  return "learning";
}

function isOverdue(cs) {
  return cs.nextReviewAt < Date.now() && cs.reps > 0;
}

function selectSessionCards(st, sessionSize, newCardsPerDay, deckId) {
  sessionSize    = sessionSize    || st.settings.sessionSize;
  newCardsPerDay = newCardsPerDay || st.settings.newCardsPerDay;
  const activeDeck = deckId || st.settings.activeDeckId;
  const todayStart    = new Date().setHours(0, 0, 0, 0);
  const tomorrowStart = todayStart + 24 * 60 * 60 * 1000;

  // デッキ指定時はそのデッキのカードIDのみに絞る
  let eligibleIds = null;
  if (activeDeck) {
    eligibleIds = new Set(st.cards.filter(c => (c.deckIds || []).includes(activeDeck)).map(c => c.id));
  }

  const eligible = cs => !eligibleIds || eligibleIds.has(cs.cardId);

  const overdue = st.cardStates
    .filter(cs => eligible(cs) && cs.nextReviewAt < todayStart && cs.reps > 0)
    .sort((a, b) => a.nextReviewAt - b.nextReviewAt);

  const dueToday = st.cardStates
    .filter(cs => eligible(cs) && cs.nextReviewAt >= todayStart && cs.nextReviewAt < tomorrowStart);

  const reviewedToday = countReviewedToday(st);
  const newSlots = Math.max(0, newCardsPerDay - reviewedToday);
  const newCards = st.cardStates
    .filter(cs => eligible(cs) && cs.reps === 0 && cs.lastReviewedAt === null)
    .slice(0, newSlots);

  return [...overdue, ...dueToday, ...newCards].slice(0, sessionSize);
}

function selectExtraSessionCards(st, mode, deckId) {
  // mode: 'new' = 未学習カード全て, 'all' = 全カード（SRS無視）
  const activeDeck = deckId || st.settings.activeDeckId;
  let eligibleIds = null;
  if (activeDeck) {
    eligibleIds = new Set(st.cards.filter(c => (c.deckIds || []).includes(activeDeck)).map(c => c.id));
  }
  const eligible = cs => !eligibleIds || eligibleIds.has(cs.cardId);

  if (mode === 'new') {
    return st.cardStates.filter(cs => eligible(cs) && cs.reps === 0 && cs.lastReviewedAt === null);
  }
  // 'all': 全カード
  return st.cardStates.filter(cs => eligible(cs));
}

function countReviewedToday(st) {
  const todayStart = new Date().setHours(0, 0, 0, 0);
  return st.logs.filter(l => l.reviewedAt >= todayStart).length;
}

function calculateRetentionRate(logs) {
  const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
  const recent = logs.filter(l => l.reviewedAt >= cutoff);
  if (recent.length === 0) return 0;
  return recent.filter(l => l.rating >= 1).length / recent.length;
}

function updateStreak(stats, todayDate) {
  const today = todayDate || new Date().toISOString().split('T')[0];
  if (stats.lastStudyDate === today) return stats;
  if (!stats.lastStudyDate) return { ...stats, streakDays: 1, lastStudyDate: today };
  const yesterday = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString().split('T')[0];
  if (stats.lastStudyDate === yesterday)
    return { ...stats, streakDays: stats.streakDays + 1, lastStudyDate: today };
  return { ...stats, streakDays: 1, lastStudyDate: today };
}

/* ===== ユーティリティ ===== */

function generateId() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function formatDate(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function formatNextReview(cs) {
  if (!cs.lastReviewedAt && cs.reps === 0) return "未学習";
  if (isOverdue(cs)) {
    const days = Math.floor((Date.now() - cs.nextReviewAt) / (24*60*60*1000));
    return `期限超過 ${days}日`;
  }
  const diff = cs.nextReviewAt - Date.now();
  const days = Math.ceil(diff / (24*60*60*1000));
  if (days <= 0) return "今日";
  if (days === 1) return "明日";
  return `${days}日後`;
}

function getCategories() {
  return (state && state.categories) ? state.categories : DEFAULT_CATEGORIES;
}

function getCategoryById(id) {
  return getCategories().find(c => c.id === id) || null;
}

function getChapterTagStyle(chapterId) {
  const ch = getCategoryById(chapterId);
  if (!ch) return { bg: "#F3F4F6", fg: "#6B7280" };
  return CATEGORY_COLORS[ch.color] || { bg: "#F3F4F6", fg: "#6B7280" };
}

function getChapterName(chapterId) {
  const ch = getCategoryById(chapterId);
  return ch ? ch.name : (chapterId || '未分類');
}

function getCardDotClass(cs) {
  if (isOverdue(cs)) return "dot--overdue";
  const status = getCardStatus(cs);
  return status === "new" ? "dot--new"
       : status === "mastered" ? "dot--mastered"
       : "dot--learning";
}

function getWeeklyReviewCounts(logs) {
  const counts = [];
  const now = Date.now();
  for (let i = 6; i >= 0; i--) {
    const dayStart = new Date(now - i * 24*60*60*1000).setHours(0,0,0,0);
    const dayEnd   = dayStart + 24*60*60*1000;
    counts.push(logs.filter(l => l.reviewedAt >= dayStart && l.reviewedAt < dayEnd).length);
  }
  return counts;
}

/* ===== トースト ===== */

let toastCount = 0;

function showToast(message, type) {
  if (toastCount >= 3) return;
  toastCount++;
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' toast-' + type : '');
  toast.textContent = message;
  toast.onclick = () => removeToast(toast);
  container.appendChild(toast);

  setTimeout(() => removeToast(toast), 3000);
}

function removeToast(el) {
  if (!el.parentNode) return;
  el.parentNode.removeChild(el);
  toastCount = Math.max(0, toastCount - 1);
}

/* ===== ナビゲーション ===== */

function navigateTo(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === viewName);
  });
  const view = document.getElementById('view-' + viewName);
  if (view) {
    view.classList.add('active');
    renderView(viewName);
  }
  state.currentView = viewName;
}

function renderView(viewName) {
  if (viewName === 'home')    renderHome();
  if (viewName === 'cards')   renderCards();
  if (viewName === 'decks')   renderDecks();
  if (viewName === 'profile') renderProfile();
}

/* ===== Home 画面レンダー ===== */

function renderHome() {
  const todayStart    = new Date().setHours(0,0,0,0);
  const tomorrowStart = todayStart + 24*60*60*1000;
  const dayAfterStart = tomorrowStart + 24*60*60*1000;

  // アクティブデッキフィルタ
  const activeDeckId = state.settings.activeDeckId;
  let deckFilter = null;
  if (activeDeckId) {
    deckFilter = new Set(state.cards.filter(c => (c.deckIds || []).includes(activeDeckId)).map(c => c.id));
  }
  const inScope = cs => !deckFilter || deckFilter.has(cs.cardId);

  const overdueCards  = state.cardStates.filter(cs => inScope(cs) && cs.nextReviewAt < todayStart && cs.reps > 0);
  const todayCards    = state.cardStates.filter(cs => inScope(cs) && cs.nextReviewAt >= todayStart && cs.nextReviewAt < tomorrowStart);
  const tomorrowCards = state.cardStates.filter(cs => inScope(cs) && cs.nextReviewAt >= tomorrowStart && cs.nextReviewAt < dayAfterStart);
  const newCards      = state.cardStates.filter(cs => inScope(cs) && cs.reps === 0 && cs.lastReviewedAt === null);

  const todayTotal = overdueCards.length + todayCards.length + Math.min(newCards.length, state.settings.newCardsPerDay);

  document.getElementById('hero-count').textContent = todayTotal;

  const subtitle = todayTotal === 0
    ? '今日の復習はありません'
    : overdueCards.length > 0
      ? `期限超過 ${overdueCards.length}枚 含む`
      : '今日の分を学習しましょう';
  document.getElementById('hero-subtitle').textContent = subtitle;

  document.getElementById('count-overdue').textContent  = overdueCards.length;
  document.getElementById('count-today').textContent    = todayCards.length + newCards.slice(0, state.settings.newCardsPerDay).length;
  document.getElementById('count-tomorrow').textContent = tomorrowCards.length;

  const retention = Math.round(calculateRetentionRate(state.logs) * 100);
  document.getElementById('stat-streak').textContent    = state.stats.streakDays;
  document.getElementById('stat-retention').textContent = retention;

  // アクティブデッキバナー
  const banner = document.getElementById('active-deck-banner');
  if (banner) {
    if (activeDeckId) {
      const deck = (state.decks || []).find(d => d.id === activeDeckId);
      if (deck) {
        banner.style.display = 'flex';
        document.getElementById('active-deck-name').textContent = deck.name;
      } else {
        banner.style.display = 'none';
      }
    } else {
      banner.style.display = 'none';
    }
  }

  renderWeeklyGraph();
}

function clearActiveDeckFromHome() {
  state.settings.activeDeckId = null;
  saveState();
  renderHome();
  showToast('全体モードに戻りました');
}

function renderWeeklyGraph() {
  const container = document.getElementById('weekly-graph');
  const counts = getWeeklyReviewCounts(state.logs);
  const maxVal = Math.max(...counts, 1);
  const dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
  const todayIdx = new Date().getDay();

  container.innerHTML = '';
  counts.forEach((cnt, i) => {
    const relDay = (todayIdx - (6 - i) + 7) % 7;
    const label = i === 6 ? '今日' : dayLabels[relDay];
    const heightPct = Math.max((cnt / maxVal) * 100, 5);

    const wrap = document.createElement('div');
    wrap.className = 'graph-bar-wrap';

    const bar = document.createElement('div');
    bar.className = 'graph-bar' + (i === 6 ? ' graph-bar--today' : '');
    bar.style.height = heightPct + '%';
    bar.title = `${cnt}枚`;

    const lbl = document.createElement('div');
    lbl.className = 'graph-day-label';
    lbl.textContent = label;

    wrap.appendChild(bar);
    wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}

/* ===== Cards 画面レンダー ===== */

let currentChapterFilter = 'all';

function renderCards() {
  const { cards, cardStates } = state;

  const csMap = {};
  cardStates.forEach(cs => { csMap[cs.cardId] = cs; });

  const allCount      = cards.length;
  const newCount      = cardStates.filter(cs => getCardStatus(cs) === 'new').length;
  const learningCount = cardStates.filter(cs => getCardStatus(cs) === 'learning').length;
  const masteredCount = cardStates.filter(cs => getCardStatus(cs) === 'mastered').length;

  document.getElementById('summary-total').textContent   = allCount;
  document.getElementById('summary-new').textContent     = newCount;
  document.getElementById('summary-learning').textContent= learningCount;
  document.getElementById('summary-mastered').textContent= masteredCount;

  renderChapterFilterChips();

  let filtered = currentChapterFilter === 'all'
    ? cards
    : cards.filter(c => c.chapter === currentChapterFilter);

  if (searchActive && searchQuery) {
    filtered = searchCards(filtered, searchQuery);
    const countEl = document.getElementById('search-result-count');
    if (countEl) countEl.textContent = `${filtered.length} 件見つかりました`;
  }

  const container = document.getElementById('card-list-container');

  if (filtered.length === 0) {
    const msg = searchActive && searchQuery
      ? { icon: '🔍', title: '検索結果がありません', desc: `「${searchQuery}」に一致するカードが見つかりませんでした` }
      : { icon: '📚', title: 'カードがありません', desc: '右下の＋ボタンでカードを作成しましょう' };
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">${msg.icon}</div>
        <div class="empty-state__title">${msg.title}</div>
        <div class="empty-state__desc">${escapeHtml(msg.desc)}</div>
      </div>`;
    return;
  }

  const listEl = document.createElement('div');
  listEl.className = 'card-list';

  filtered.forEach(card => {
    const cs = csMap[card.id];
    if (!cs) return;

    const dotClass  = getCardDotClass(cs);
    const nextStr   = formatNextReview(cs);
    const chStyle   = getChapterTagStyle(card.chapter);
    const chName    = getChapterName(card.chapter);

    const item = document.createElement('div');
    item.className = 'card-item';
    item.onclick = () => showCardDetail(card.id);
    item.innerHTML = `
      <span class="card-item__status-dot ${dotClass}"></span>
      <div class="card-item__body">
        <div class="card-item__front">${escapeHtml(card.front)}</div>
        <div class="card-item__meta">
          <span class="tag" style="background:${chStyle.bg};color:${chStyle.fg};">${escapeHtml(chName)}</span>
          <span class="card-item__next-review">${nextStr}</span>
        </div>
      </div>
      <svg class="icon card-item__arrow" width="16" height="16"><use href="#icon-chevron-right"/></svg>`;

    listEl.appendChild(item);
  });

  container.innerHTML = '';
  container.appendChild(listEl);
}

function renderChapterFilterChips() {
  const container = document.getElementById('chapter-filter-chips');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'chip ' + (currentChapterFilter === 'all' ? 'chip-active' : 'chip-default');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => { currentChapterFilter = 'all'; renderCards(); };
  container.appendChild(allBtn);

  getCategories().forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chip ' + (currentChapterFilter === ch.id ? 'chip-active' : 'chip-default');
    btn.textContent = ch.name;
    btn.onclick = () => { currentChapterFilter = ch.id; renderCards(); };
    container.appendChild(btn);
  });

/* ===== 章別進捗 ===== */

function getChapterProgress(chapterId) {
  const chapterCards = state.cards.filter(c => c.chapter === chapterId);
  const ids = new Set(chapterCards.map(c => c.id));
  const states = state.cardStates.filter(cs => ids.has(cs.cardId));
  const masteredCount = states.filter(s => getCardStatus(s) === 'mastered').length;
  const learningCount = states.filter(s => getCardStatus(s) === 'learning').length;
  const newCount      = states.filter(s => getCardStatus(s) === 'new').length;
  return {
    total: chapterCards.length,
    new: newCount,
    learning: learningCount,
    mastered: masteredCount,
    masteryRate: states.length > 0 ? masteredCount / states.length : 0
  };
}

function getCategoryProgress(categoryId) {
  return getChapterProgress(categoryId);
}

function getMonthlyReviewCounts(logs) {
  const counts = [];
  const now = Date.now();
  for (let i = 27; i >= 0; i--) {
    const dayStart = new Date(now - i * 24*60*60*1000).setHours(0,0,0,0);
    const dayEnd   = dayStart + 24*60*60*1000;
    counts.push(logs.filter(l => l.reviewedAt >= dayStart && l.reviewedAt < dayEnd).length);
  }
  return counts;
}

/* ===== 学習セッション ===== */

let session = {
  queue: [],         // CardState の配列（出題順）
  retryMap: null,    // Map<cardId, boolean> 再投入済みフラグ
  currentIdx: 0,
  id: null,
  startTime: null,
  cardStartTime: null,
  answerShown: false,
  ratingDist: { forgotten: 0, normal: 0, easy: 0 },
  totalQueued: 0     // セッション開始時の枚数（完了率計算用）
};

function startSession() {
  const cards = selectSessionCards(state);
  if (cards.length === 0) {
    showToast('今日の復習カードはありません。追加学習から新規カードを学べます。');
    return;
  }

  const activeDeck = state.settings.activeDeckId;
  if (activeDeck) {
    const deck = (state.decks || []).find(d => d.id === activeDeck);
    if (deck) showToast(`デッキ「${deck.name}」で学習開始`, 'success');
  }

  const overdueCount = cards.filter(cs => isOverdue(cs)).length;
  if (overdueCount > 0) {
    showToast(`期限超過カードが ${overdueCount} 枚あります`, 'warning');
  }

  _launchSession(cards);
}

function closeSession() {
  if (session.queue.length > 0 && session.currentIdx < session.queue.length) {
    const ok = confirm('学習を中断しますか？');
    if (!ok) return;
  }
  finalizeSession();
  document.getElementById('session-overlay').style.display = 'none';
  renderHome();
}

function startExtraSession(mode) {
  // mode: 'new' = 未学習, 'free' = 自由選択ピッカーを開く
  if (mode === 'new') {
    const cards = selectExtraSessionCards(state, 'new');
    if (cards.length === 0) {
      showToast('未学習カードはありません', 'error');
      return;
    }
    _launchSession(cards);
    showToast(`未学習 ${cards.length} 枚で学習開始`);
    return;
  }
  if (mode === 'free') {
    openFreeSessionPicker();
  }
}

          ${getCategories().map(ch => {

            const count = state.cardStates.filter(cs => ids.has(cs.cardId)).length;
            if (count === 0) return '';
            return `<button class="btn-secondary" onclick="startExtraSessionByCategory('${ch.id}')">
              ${escapeHtml(ch.name)} <span style="font-size:12px;opacity:0.7;margin-left:4px;">${count}枚</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  document.getElementById('app').appendChild(overlay);
}

function startExtraSessionAll(mode) {
  const cards = selectExtraSessionCards(state, mode);
  if (cards.length === 0) { showToast('対象カードがありません', 'error'); return; }
  document.getElementById('free-session-overlay')?.remove();
  _launchSession(cards);
  showToast(`${cards.length} 枚で学習開始`);
}

function startExtraSessionByCategory(categoryId) {
  const ids = new Set(state.cards.filter(c => c.chapter === categoryId).map(c => c.id));
  const cards = state.cardStates.filter(cs => ids.has(cs.cardId));
  if (cards.length === 0) { showToast('カードがありません', 'error'); return; }
  document.getElementById('free-session-overlay')?.remove();
  _launchSession(cards);
  const catName = getChapterName(categoryId);
  showToast(`「${catName}」${cards.length}枚で学習開始`);
}

function _launchSession(cards) {
  session.queue       = [...cards];
  session.retryMap    = new Map();
  session.currentIdx  = 0;
  session.id          = generateId();
  session.startTime   = Date.now();
  session.cardStartTime = Date.now();
  session.answerShown = false;
  session.ratingDist  = { forgotten: 0, normal: 0, easy: 0 };
  session.totalQueued = cards.length;

  state.sessions.push({
    id: session.id, startedAt: session.startTime, endedAt: null,
    cardCount: cards.length, completedCount: 0,
    ratingDistribution: { forgotten: 0, normal: 0, easy: 0 }
  });
  saveState();
  document.getElementById('session-overlay').style.display = 'flex';
  renderSessionCard();
}

function renderSessionCard() {
  const total   = session.totalQueued;
  const done    = session.currentIdx;
  const pct     = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('session-progress-text').textContent = `${done} / ${total}`;
  document.getElementById('session-progress-bar').style.width  = pct + '%';

  if (session.currentIdx >= session.queue.length) {
    renderSessionComplete();
    return;
  }

  const cs   = session.queue[session.currentIdx];
  const card = state.cards.find(c => c.id === cs.cardId);
  if (!card) { advanceSession(); return; }

  session.answerShown  = false;
  session.cardStartTime = Date.now();

  const content = document.getElementById('session-content');
  content.innerHTML = '';

  const cardEl = document.createElement('div');
  cardEl.className = 'study-card';
  cardEl.id = 'study-card-el';
  cardEl.setAttribute('role', 'button');
  cardEl.setAttribute('tabindex', '0');
  cardEl.setAttribute('aria-label', '答えを表示');
  cardEl.innerHTML = `
    <div>
      <div class="study-card-label study-card-label-q">Q.</div>
      <div class="study-card-front" id="card-front-text">${escapeHtml(card.front)}</div>
    </div>
    <div class="study-card-hint">
      <svg class="icon" width="14" height="14"><use href="#icon-cards"/></svg>
      タップして答えを表示
    </div>`;
  cardEl.onclick = showAnswer;
  cardEl.onkeydown = e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); showAnswer(); } };

  content.appendChild(cardEl);

  const ratingArea = document.createElement('div');
  ratingArea.id = 'rating-area';
  content.appendChild(ratingArea);
}

function showAnswer() {
  if (session.answerShown) return;
  session.answerShown = true;

  const cs   = session.queue[session.currentIdx];
  const card = state.cards.find(c => c.id === cs.cardId);
  if (!card) return;

  const cardEl = document.getElementById('study-card-el');
  if (!cardEl) return;

  const preview = previewIntervals(cs);

  cardEl.onclick   = null;
  cardEl.innerHTML = `
    <div>
      <div class="study-card-label study-card-label-q">Q.</div>
      <div class="study-card-front study-card-front--dimmed">${escapeHtml(card.front)}</div>
    </div>
    <div>
      <div class="study-card-label study-card-label-a">A.</div>
      <div class="study-card-back">${escapeHtml(card.back)}</div>
      ${card.note ? `<div class="study-card-note">${escapeHtml(card.note)}</div>` : ''}
    </div>`;

  const ratingArea = document.getElementById('rating-area');
  ratingArea.innerHTML = `
    <div class="rating-buttons">
      <button class="rating-btn rating-btn-forgotten" onclick="rateCard(0)" aria-label="わからない">
        <span class="rating-label">わからない</span>
        <span class="rating-interval">${preview.forgotten}</span>
      </button>
      <button class="rating-btn rating-btn-normal" onclick="rateCard(1)" aria-label="普通">
        <span class="rating-label">普通</span>
        <span class="rating-interval">${preview.normal}</span>
      </button>
      <button class="rating-btn rating-btn-easy" onclick="rateCard(2)" aria-label="余裕">
        <span class="rating-label">余裕</span>
        <span class="rating-interval">${preview.easy}</span>
      </button>
    </div>`;
}

function rateCard(rating) {
  const cs   = session.queue[session.currentIdx];
  const card = state.cards.find(c => c.id === cs.cardId);
  if (!card) { advanceSession(); return; }

  const responseTimeMs = Date.now() - session.cardStartTime;

  const newCs = reviewCard(cs, rating);

  const csIdx = state.cardStates.findIndex(s => s.cardId === cs.cardId);
  if (csIdx !== -1) state.cardStates[csIdx] = newCs;

  const logEntry = {
    id: generateId(),
    cardId: card.id,
    sessionId: session.id,
    rating: rating,
    reviewedAt: Date.now(),
    responseTimeMs: responseTimeMs
  };
  state.logs.push(logEntry);
  state.stats.totalReviews++;

  if (rating === 0) {
    session.ratingDist.forgotten++;
    if (!session.retryMap.has(card.id)) {
      session.retryMap.set(card.id, true);
      session.queue.push(cs);
    }
  } else if (rating === 1) {
    session.ratingDist.normal++;
  } else {
    session.ratingDist.easy++;
  }

  const sessIdx = state.sessions.findIndex(s => s.id === session.id);
  if (sessIdx !== -1) {
    state.sessions[sessIdx].completedCount++;
    state.sessions[sessIdx].ratingDistribution = { ...session.ratingDist };
  }

  saveState();
  advanceSession();
}

function advanceSession() {
  session.currentIdx++;
  renderSessionCard();
}

function renderSessionComplete() {
  const total = session.totalQueued;
  const { forgotten, normal, easy } = session.ratingDist;
  const allRated = forgotten + normal + easy;
  const retention = allRated > 0 ? Math.round((normal + easy) / allRated * 100) : 0;

  finalizeSession();

  const content = document.getElementById('session-content');
  content.innerHTML = `
    <div class="session-complete">
      <div class="session-complete__emoji">🎉</div>
      <div class="session-complete__title">セッション完了！</div>
      <div class="session-complete__subtitle">${total}枚の学習が終わりました</div>
      <div class="session-complete__stats">
        <div class="session-complete__stat">
          <div class="session-complete__stat-value" style="color:var(--color-danger);">${forgotten}</div>
          <div class="session-complete__stat-label">わからない</div>
        </div>
        <div class="session-complete__stat">
          <div class="session-complete__stat-value" style="color:var(--color-warning);">${normal}</div>
          <div class="session-complete__stat-label">普通</div>
        </div>
        <div class="session-complete__stat">
          <div class="session-complete__stat-value" style="color:var(--color-primary);">${easy}</div>
          <div class="session-complete__stat-label">余裕</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="endSession()" style="max-width:280px;">
        ホームに戻る
      </button>
    </div>`;

  document.getElementById('session-progress-bar').style.width = '100%';
  document.getElementById('session-progress-text').textContent = `${total} / ${total}`;
}

function finalizeSession() {
  const sessIdx = state.sessions.findIndex(s => s.id === session.id);
  if (sessIdx !== -1 && !state.sessions[sessIdx].endedAt) {
    state.sessions[sessIdx].endedAt = Date.now();
    state.sessions[sessIdx].ratingDistribution = { ...session.ratingDist };
  }

  state.stats = updateStreak(state.stats);
  state.stats.retentionRate = calculateRetentionRate(state.logs);
  saveState();
}

function endSession() {
  document.getElementById('session-overlay').style.display = 'none';
  renderHome();
  showToast(`学習完了！連続 ${state.stats.streakDays} 日目`, 'success');
}

let editingTags = [];

function showCardCreate() {
  editingTags = [];

  const sel = document.getElementById('card-chapter');
  sel.innerHTML = getCategories().map(ch =>
    `<option value="${ch.id}">${ch.name}</option>`
  ).join('');

  document.getElementById('card-front').value = '';
  document.getElementById('card-back').value  = '';
  document.getElementById('card-note').value  = '';

  renderTagChipsInForm();
  renderTagSuggestions();

  document.getElementById('card-create-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('card-front').focus(), 100);
}

function closeCardCreate() {
  const hasInput = document.getElementById('card-front').value.trim()
                || document.getElementById('card-back').value.trim();
  if (hasInput && !confirm('入力内容を破棄してよろしいですか？')) return;
  document.getElementById('card-create-overlay').style.display = 'none';
}

function handleTagKeydown(e) {
  const input = e.target;
  if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
    e.preventDefault();
    addTag(input.value.trim());
    input.value = '';
    renderTagSuggestions();
  }
  if (e.key === 'Backspace' && input.value === '' && editingTags.length > 0) {
    editingTags.pop();
    renderTagChipsInForm();
  }
}

function addTag(tag) {
  const normalized = tag.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-　-鿿゠-ヿ぀-ゟ]/g, '');
  if (!normalized || editingTags.includes(normalized)) return;
  editingTags.push(normalized);
  renderTagChipsInForm();
}

function removeTag(idx) {
  editingTags.splice(idx, 1);
  renderTagChipsInForm();
}

function renderTagChipsInForm() {
  const area  = document.getElementById('tag-input-area');
  const input = document.getElementById('tag-text-input-el');
  area.querySelectorAll('.tag-chip').forEach(el => el.remove());
  editingTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${escapeHtml(t)}<button class="tag-chip__remove" onclick="removeTag(${i})" aria-label="${escapeHtml(t)}を削除">×</button>`;
    area.insertBefore(chip, input);
  });
}

function renderTagSuggestions() {
  const inputEl = document.getElementById('tag-text-input-el');
  const query   = inputEl ? inputEl.value.trim().toLowerCase() : '';
  const used    = getAllUsedTags(state.cards);
  const filtered = used
    .filter(t => !editingTags.includes(t) && (query === '' || t.includes(query)))
    .slice(0, 12);

  const container = document.getElementById('tag-suggestions');
  if (!container) return;
  container.innerHTML = '';
  filtered.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag-suggestion-chip';
    btn.textContent = t;
    btn.onclick = () => {
      addTag(t);
      document.getElementById('tag-text-input-el').value = '';
      renderTagSuggestions();
    };
    container.appendChild(btn);
  });
}

function getAllUsedTags(cards) {
  const set = new Set();
  if (state && state.tags) state.tags.forEach(t => set.add(t));
  cards.forEach(c => c.tags.forEach(t => set.add(t)));
  return [...set].sort();
}

function saveCard() {
  const chapter = document.getElementById('card-chapter').value;
  const front   = document.getElementById('card-front').value.trim();
  const back    = document.getElementById('card-back').value.trim();
  const note    = document.getElementById('card-note').value.trim();

  if (!front) { showToast('Q.（質問）を入力してください', 'error'); return; }
  if (!back)  { showToast('A.（答え）を入力してください', 'error'); return; }
  if (front.length > 500) { showToast('Q.は500文字以内にしてください', 'error'); return; }
  if (back.length  > 500) { showToast('A.は500文字以内にしてください', 'error'); return; }

  const now  = Date.now();
  const id   = generateId();

  const card = { id, chapter, tags: [...editingTags], front, back, note, createdAt: now, updatedAt: now };
  const cs   = { cardId: id, ef: 2.5, interval: 0, reps: 0, nextReviewAt: now, lastReviewedAt: null };

  state.cards.push(card);
  state.cardStates.push(cs);
  state.stats.totalCards++;
  saveState();

  document.getElementById('card-create-overlay').style.display = 'none';
  renderCards();
  showToast('カードを作成しました', 'success');
}

  const chapter = document.getElementById('edit-chapter').value;
  const front   = document.getElementById('edit-front').value.trim();

function deleteCard(cardId) {

  if (!card) return;
  const ok = confirm(`「${card.front.slice(0, 30)}...」を削除します。よろしいですか？`);
  if (!ok) return;

  state.cards      = state.cards.filter(c => c.id !== cardId);
  state.cardStates = state.cardStates.filter(cs => cs.cardId !== cardId);
  state.stats.totalCards = state.cards.length;
  saveState();

  document.getElementById('card-detail-overlay').style.display = 'none';
  detailCardId   = null;
  detailEditMode = false;
  renderCards();
  showToast('カードを削除しました');
}

/* ===== エクスポート / インポート ===== */

function exportData() {
  const payload = {
    exportedAt: Date.now(),
    appVersion: "2.0",
    data: state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `srs-backup-${formatDate(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('エクスポートしました', 'success');
}

function triggerImport() {
  document.getElementById('import-file-input').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.data || !payload.data.version) {
        showToast('無効なファイル形式です', 'error');
        return;
      }
      if (!["1.0", "2.0"].includes(payload.data.version)) {
        showToast('対応していないバージョンです', 'error');
        return;
      }
      const ok = confirm('現在のデータをインポートデータで完全に上書きします。よろしいですか？');
      if (!ok) return;
      saveState(payload.data);
      location.reload();
    } catch (err) {
      showToast('読み込みに失敗しました', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  const ok = confirm('すべての学習データを削除します。この操作は取り消せません。よろしいですか？');
  if (!ok) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* ===== カテゴリ CRUD ===== */

let editingCategoryColor = 'primary';

function openCategoryEdit(categoryId) {
  const isNew = !categoryId;
  editingCategoryColor = isNew ? 'primary' : (getCategoryById(categoryId)?.color || 'primary');

  document.getElementById('category-edit-title').textContent = isNew ? 'カテゴリを追加' : 'カテゴリを編集';
  document.getElementById('category-edit-id').value   = categoryId || '';
  document.getElementById('category-edit-name').value = isNew ? '' : (getCategoryById(categoryId)?.name || '');

  renderColorPicker();
  document.getElementById('category-edit-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('category-edit-name').focus(), 100);
}

function closeCategoryEdit() {
  document.getElementById('category-edit-overlay').style.display = 'none';
}

function renderColorPicker() {
  const container = document.getElementById('category-color-picker');
  container.innerHTML = COLOR_OPTIONS.map(opt => `
    <div class="color-swatch${editingCategoryColor === opt.id ? ' selected' : ''}"
      style="background:${opt.sample};"
      title="${opt.label}"
      onclick="selectCategoryColor('${opt.id}')"></div>
  `).join('');
}

function selectCategoryColor(colorId) {
  editingCategoryColor = colorId;
  renderColorPicker();
}

function saveCategoryEdit() {
  const name = document.getElementById('category-edit-name').value.trim();
  if (!name) { showToast('カテゴリ名を入力してください', 'error'); return; }

  const id = document.getElementById('category-edit-id').value;

  if (id) {
    const idx = state.categories.findIndex(c => c.id === id);
    if (idx !== -1) {
      state.categories[idx] = { ...state.categories[idx], name, color: editingCategoryColor };
    }
    showToast('カテゴリを更新しました', 'success');
  } else {
    const newId = 'cat-' + generateId().slice(0, 8);
    const maxOrder = state.categories.reduce((m, c) => Math.max(m, c.order || 0), 0);
    state.categories.push({ id: newId, name, color: editingCategoryColor, order: maxOrder + 1 });
    showToast('カテゴリを追加しました', 'success');
  }

  saveState();
  closeCategoryEdit();
  renderProfile();
}

/* ===== タグ管理 ===== */

function openAddTagPrompt() {
  const name = prompt('追加するタグ名を入力してください:');
  if (!name || !name.trim()) return;
  const normalized = name.trim().toLowerCase().replace(/\s+/g, '-');
  if (!state.tags) state.tags = [];
  if (state.tags.includes(normalized)) { showToast('すでに存在するタグです', 'error'); return; }
  state.tags.push(normalized);
  saveState();
  renderProfile();
  showToast('タグを追加しました', 'success');
}

function deleteTag(tagName) {
  const usedCount = state.cards.filter(c => c.tags.includes(tagName)).length;
  const msg = usedCount > 0
    ? `タグ「${tagName}」を削除します。${usedCount}枚のカードからも外れます。よろしいですか？`
    : `タグ「${tagName}」を削除しますか？`;
  if (!confirm(msg)) return;

  if (!state.tags) state.tags = [];
  state.tags = state.tags.filter(t => t !== tagName);
  if (usedCount > 0) {
    state.cards = state.cards.map(c => ({ ...c, tags: c.tags.filter(t => t !== tagName) }));
  }
  saveState();
  renderProfile();
  showToast('タグを削除しました');
}

function deleteCategory(categoryId) {
  const cat = getCategoryById(categoryId);
  if (!cat) return;
  const cardCount = state.cards.filter(c => c.chapter === categoryId).length;
  const msg = cardCount > 0
    ? `「${cat.name}」を削除します。このカテゴリに属する ${cardCount} 枚のカードは「未分類」に移動します。よろしいですか？`
    : `「${cat.name}」を削除しますか？`;
  if (!confirm(msg)) return;

  if (cardCount > 0) {
    state.cards = state.cards.map(c =>
      c.chapter === categoryId ? { ...c, chapter: 'uncategorized' } : c
    );
    // 未分類カテゴリが存在しなければ追加
    if (!getCategoryById('uncategorized')) {
      state.categories.push({ id: 'uncategorized', name: '未分類', color: 'primary', order: 999 });
    }
  }

  state.categories = state.categories.filter(c => c.id !== categoryId);
  saveState();
  renderProfile();
  showToast('カテゴリを削除しました');
}

/* ===== デッキ管理 ===== */

let editingDeckColor = 'primary';
let currentDeckId    = null;
let deckSelectedCardIds = new Set();
let deckAddCardsSelected = new Set();

function renderDecks() {
  const container = document.getElementById('decks-content');
  const decks = state.decks || [];

  if (decks.length === 0) {
    container.innerHTML = `
      <div class="deck-empty">
        <div class="deck-empty__icon">📦</div>
        <div style="font-weight:600;margin-bottom:6px;">デッキがまだありません</div>
        <div style="font-size:13px;">右上の＋でデッキを作成しましょう</div>
      </div>`;
    return;
  }

  const deckBarColors = {
    success: '#10B981', primary: '#3A7AFE', warning: '#F59E0B',
    danger: '#EF4444', purple: '#8B5CF6', orange: '#F97316', teal: '#14B8A6'
  };
  const activeDeckId = state.settings.activeDeckId;

  const html = decks.map(deck => {
    const cardIds = state.cards.filter(c => (c.deckIds || []).includes(deck.id)).map(c => c.id);
    const dueCount = state.cardStates.filter(cs =>
      cardIds.includes(cs.cardId) &&
      (cs.nextReviewAt <= Date.now() || (cs.reps === 0 && !cs.lastReviewedAt))
    ).length;
    const isActive = activeDeckId === deck.id;
    const barColor = deckBarColors[deck.color] || '#3A7AFE';
    return `
      <div class="deck-card" onclick="showDeckDetail('${deck.id}')">
        <div class="deck-card__header">
          <div class="deck-card__color-bar" style="background:${barColor};"></div>
          <div class="deck-card__name">${escapeHtml(deck.name)}</div>
          ${isActive ? '<span class="deck-card__active-badge">学習中</span>' : ''}
        </div>
        ${deck.desc ? `<div class="deck-card__desc">${escapeHtml(deck.desc)}</div>` : ''}
        <div class="deck-card__stats">
          <span>${cardIds.length}枚</span>
          <span>要復習 ${dueCount}枚</span>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `<div class="deck-list">${html}</div>`;
}

function openDeckEdit(deckId) {
  const isNew = !deckId;
  const deck  = isNew ? null : (state.decks || []).find(d => d.id === deckId);
  editingDeckColor = isNew ? 'primary' : (deck?.color || 'primary');

  document.getElementById('deck-edit-title').textContent = isNew ? 'デッキを追加' : 'デッキを編集';
  document.getElementById('deck-edit-id').value   = deckId || '';
  document.getElementById('deck-edit-name').value = deck?.name || '';
  document.getElementById('deck-edit-desc').value = deck?.desc || '';

  renderDeckColorPicker();
  document.getElementById('deck-edit-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('deck-edit-name').focus(), 100);
}

function closeDeckEdit() {
  document.getElementById('deck-edit-overlay').style.display = 'none';
}

function renderDeckColorPicker() {
  const container = document.getElementById('deck-color-picker');
  container.innerHTML = COLOR_OPTIONS.map(opt => `
    <div class="color-swatch${editingDeckColor === opt.id ? ' selected' : ''}"
      style="background:${opt.sample};"
      title="${opt.label}"
      onclick="selectDeckColor('${opt.id}')"></div>
  `).join('');
}

function selectDeckColor(colorId) {
  editingDeckColor = colorId;
  renderDeckColorPicker();
}

function saveDeckEdit() {
  const name = document.getElementById('deck-edit-name').value.trim();
  if (!name) { showToast('デッキ名を入力してください', 'error'); return; }
  const desc = document.getElementById('deck-edit-desc').value.trim();
  const id   = document.getElementById('deck-edit-id').value;
  const now  = Date.now();

  if (!state.decks) state.decks = [];

  if (id) {
    const idx = state.decks.findIndex(d => d.id === id);
    if (idx !== -1) state.decks[idx] = { ...state.decks[idx], name, desc, color: editingDeckColor, updatedAt: now };
    showToast('デッキを更新しました', 'success');
  } else {
    const newId = 'deck-' + generateId().slice(0, 8);
    state.decks.push({ id: newId, name, desc, color: editingDeckColor, createdAt: now, updatedAt: now });
    showToast('デッキを作成しました', 'success');
  }

  saveState();
  closeDeckEdit();
  if (document.getElementById('deck-detail-overlay').style.display !== 'none') {
    renderDeckDetail(id || state.decks[state.decks.length - 1].id);
  }
  renderDecks();
}

function showDeckDetail(deckId) {
  currentDeckId = deckId;
  deckSelectedCardIds = new Set();
  renderDeckDetail(deckId);
  document.getElementById('deck-detail-overlay').style.display = 'flex';
}

function closeDeckDetail() {
  document.getElementById('deck-detail-overlay').style.display = 'none';
  currentDeckId = null;
  deckSelectedCardIds = new Set();
}

function openDeckEditFromDetail() {
  if (currentDeckId) openDeckEdit(currentDeckId);
}

function renderDeckDetail(deckId) {
  const deck = (state.decks || []).find(d => d.id === deckId);
  if (!deck) return;

  document.getElementById('deck-detail-title').textContent = deck.name;

  const deckCards = state.cards.filter(c => (c.deckIds || []).includes(deckId));
  const isActive  = state.settings.activeDeckId === deckId;
  const deckBarColors = {
    success:'#10B981',primary:'#3A7AFE',warning:'#F59E0B',
    danger:'#EF4444',purple:'#8B5CF6',orange:'#F97316',teal:'#14B8A6'
  };
  const barColor = deckBarColors[deck.color] || '#3A7AFE';

  const cardItemsHtml = deckCards.map(card => {
    const cs = state.cardStates.find(s => s.cardId === card.id);
    const checked = deckSelectedCardIds.has(card.id);
    return `
      <div class="deck-card-item">
        <div class="deck-card-item__check${checked ? ' checked' : ''}"
          onclick="toggleDeckCardSelect('${card.id}')"></div>
        <div class="deck-card-item__body">
          <div class="deck-card-item__front">${escapeHtml(card.front)}</div>
          <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px;">${cs ? formatNextReview(cs) : ''}</div>
        </div>
        <button class="btn-icon" style="color:var(--color-danger);flex-shrink:0;"
          onclick="removeCardFromDeck('${card.id}','${deckId}')" aria-label="デッキから外す">
          <svg class="icon" width="16" height="16"><use href="#icon-x"/></svg>
        </button>
      </div>`;
  }).join('');

  const selectedCount = deckSelectedCardIds.size;

  const container = document.getElementById('deck-detail-content');
  container.innerHTML = `
    <div class="deck-detail-actions">
      <button class="btn-primary" style="flex:1;" onclick="startDeckSession('${deckId}')">
        ${isActive ? '▶ このデッキで学習中' : '▶ このデッキで学習'}
      </button>
      ${isActive
        ? `<button class="btn-secondary" onclick="clearActiveDeck()">解除</button>`
        : ''}
      <button class="btn-secondary" onclick="openDeckAddCards('${deckId}')">＋ カードを追加</button>
      <button class="btn-danger" onclick="deleteDeck('${deckId}')">削除</button>
    </div>
    <div style="padding:0 var(--space-4);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;">${deckCards.length}枚のカード</span>
        <div style="display:flex;gap:8px;">
          <button class="btn-text" style="font-size:12px;" onclick="selectAllDeckCards('${deckId}')">全選択</button>
          <button class="btn-text" style="font-size:12px;" onclick="deselectAllDeckCards()">解除</button>
        </div>
      </div>
      ${deckCards.length === 0
        ? '<div style="text-align:center;padding:32px;color:var(--color-text-tertiary);font-size:13px;">カードがまだありません</div>'
        : `<div>${cardItemsHtml}</div>`}
    </div>
    ${selectedCount > 0 ? `
    <div class="deck-select-bar">
      <span style="font-size:13px;">${selectedCount}枚選択中</span>
      <button class="btn-primary" style="font-size:13px;" onclick="openBulkReviewDate()">復習日を設定</button>
    </div>` : ''}`;
}

function toggleDeckCardSelect(cardId) {
  if (deckSelectedCardIds.has(cardId)) deckSelectedCardIds.delete(cardId);
  else deckSelectedCardIds.add(cardId);
  renderDeckDetail(currentDeckId);
}

function selectAllDeckCards(deckId) {
  state.cards.filter(c => (c.deckIds || []).includes(deckId)).forEach(c => deckSelectedCardIds.add(c.id));
  renderDeckDetail(currentDeckId);
}

function deselectAllDeckCards() {
  deckSelectedCardIds = new Set();
  renderDeckDetail(currentDeckId);
}

function removeCardFromDeck(cardId, deckId) {
  const idx = state.cards.findIndex(c => c.id === cardId);
  if (idx === -1) return;
  state.cards[idx] = { ...state.cards[idx], deckIds: (state.cards[idx].deckIds || []).filter(id => id !== deckId) };
  saveState();
  renderDeckDetail(deckId);
  renderDecks();
}

function startDeckSession(deckId) {
  state.settings.activeDeckId = deckId;
  saveState();
  closeDeckDetail();
  navigateTo('home');
  renderHome();
  showToast('このデッキで学習を開始します', 'success');
}

function clearActiveDeck() {
  state.settings.activeDeckId = null;
  saveState();
  renderDeckDetail(currentDeckId);
  renderHome();
  showToast('全体モードに戻りました');
}

function deleteDeck(deckId) {
  const deck = (state.decks || []).find(d => d.id === deckId);
  if (!deck) return;
  if (!confirm(`「${deck.name}」を削除しますか？\nカードはデッキから外れますが削除されません。`)) return;

  state.decks = (state.decks || []).filter(d => d.id !== deckId);
  state.cards = state.cards.map(c => ({
    ...c, deckIds: (c.deckIds || []).filter(id => id !== deckId)
  }));
  if (state.settings.activeDeckId === deckId) state.settings.activeDeckId = null;
  saveState();
  closeDeckDetail();
  renderDecks();
  renderHome();
  showToast('デッキを削除しました');
}

/* ===== デッキへのカード追加 ===== */

function openDeckAddCards(deckId) {
  currentDeckId = deckId;
  deckAddCardsSelected = new Set(
    state.cards.filter(c => (c.deckIds || []).includes(deckId)).map(c => c.id)

}

function toggleDeckAddCardSelect(cardId) {
  if (deckAddCardsSelected.has(cardId)) deckAddCardsSelected.delete(cardId);
  else deckAddCardsSelected.add(cardId);
  renderDeckAddCardslist();
}

function confirmAddCardsToDeck() {
  if (!currentDeckId) return;
  state.cards = state.cards.map(card => {
    const deckIds = new Set(card.deckIds || []);
    if (deckAddCardsSelected.has(card.id)) deckIds.add(currentDeckId);
    else deckIds.delete(currentDeckId);
    return { ...card, deckIds: [...deckIds] };
  });
  saveState();
  closeDeckAddCards();
  renderDeckDetail(currentDeckId);
  renderDecks();
  showToast('カードを更新しました', 'success');
}

function applyBulkReviewDate(days) {
  const ts = new Date().setHours(0,0,0,0) + days * 24 * 60 * 60 * 1000;
  _applyBulkDate(ts);
}

function applyBulkReviewDateFromPicker() {
  const val = document.getElementById('bulk-date-picker').value;
  if (!val) return;
  const ts = new Date(val).setHours(0,0,0,0);
  _applyBulkDate(ts);
}

function _applyBulkDate(ts) {
  deckSelectedCardIds.forEach(cardId => {
    const idx = state.cardStates.findIndex(cs => cs.cardId === cardId);
    if (idx !== -1) state.cardStates[idx] = { ...state.cardStates[idx], nextReviewAt: ts };
  });
  saveState();
  document.getElementById('bulk-date-overlay')?.remove();
  deckSelectedCardIds = new Set();
  renderDeckDetail(currentDeckId);
  showToast('復習日を設定しました', 'success');
}

/* ===== セキュリティユーティリティ ===== */

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ===== カード検索 (FR-14) ===== */

let searchActive = false;
let searchQuery  = '';

function toggleSearch() {
  searchActive = !searchActive;
  const wrap  = document.getElementById('search-bar-wrap');
  const input = document.getElementById('search-input');
  wrap.classList.toggle('visible', searchActive);
  if (searchActive) {
    searchQuery = '';
    input.value = '';
    document.getElementById('search-result-count').textContent = '';
    document.getElementById('search-clear-btn').style.display = 'none';
    setTimeout(() => input.focus(), 100);
  } else {
    searchQuery = '';
    renderCards();
  }
}

function onSearchInput() {
  const input = document.getElementById('search-input');
  searchQuery = input.value.trim();
  document.getElementById('search-clear-btn').style.display = searchQuery ? 'flex' : 'none';
  renderCards();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  document.getElementById('search-result-count').textContent = '';
  document.getElementById('search-input').focus();
  renderCards();
}

function searchCards(cards, query) {
  if (!query) return cards;
  const q = query.toLowerCase();
  return cards.filter(c =>
    c.front.toLowerCase().includes(q) ||
    c.back.toLowerCase().includes(q)  ||
    (c.note && c.note.toLowerCase().includes(q)) ||
    c.tags.some(t => t.toLowerCase().includes(q))
  );
}

/* ===== 音声入力 (FR-13) ===== */

let currentRecognition = null;

function startVoiceInput(targetId, btnId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('お使いのブラウザは音声入力に対応していません', 'error');
    return;
  }

  const btn = document.getElementById(btnId);

  if (currentRecognition) {
    currentRecognition.stop();
    currentRecognition = null;
    if (btn) { btn.classList.remove('recording'); btn.childNodes[1].textContent = '音声入力'; }
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;
  currentRecognition = recognition;

  if (btn) { btn.classList.add('recording'); btn.childNodes[1].textContent = '録音中…'; }
  showToast('音声を認識中です…');

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    const target = document.getElementById(targetId);
    if (target) {
      const cur = target.value;
      target.value = cur ? cur + (cur.endsWith('。') || cur.endsWith('、') ? '' : '') + text : text;
      target.focus();
    }
    showToast('音声を認識しました', 'success');
  };

  recognition.onerror = e => {
    const msgs = { 'no-speech': '音声が検出されませんでした', 'not-allowed': 'マイクの使用が許可されていません' };
    showToast(msgs[e.error] || '音声認識に失敗しました', 'error');
  };

  recognition.onend = () => {
    currentRecognition = null;
    if (btn) { btn.classList.remove('recording'); btn.childNodes[1].textContent = '音声入力'; }
  };

  recognition.start();
}

/* ===== キーボードショートカット ===== */

document.addEventListener('keydown', e => {
  const overlay = document.getElementById('session-overlay');
  if (!overlay || overlay.style.display === 'none') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (!session.answerShown) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); showAnswer(); }
  } else {
    if (e.key === '1') rateCard(0);
    if (e.key === '2') rateCard(1);
    if (e.key === '3') rateCard(2);
  }
});

/* ===== 初期化 ===== */

(function init() {
  state = loadState();

  // currentView が cards/profile なら home に戻す（セッション中断リロード対策）
  const validViews = ['home', 'cards', 'profile'];
  if (!validViews.includes(state.currentView)) state.currentView = 'home';

  // stats の totalCards が実際のカード数と乖離していたら修正
  if (state.stats.totalCards !== state.cards.length) {
    state.stats.totalCards = state.cards.length;
  }

  // 未完了セッションがあれば endedAt を補完
  state.sessions.forEach(s => {
    if (!s.endedAt) s.endedAt = s.startedAt;
  });

  const view = state.currentView;
  document.querySelectorAll('.bottom-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.id === 'view-' + view);
  });

  renderView(view);
  saveState();

  // 期限超過カードがあれば起動時にトースト通知
  const overdueCount = state.cardStates.filter(cs =>
    cs.nextReviewAt < new Date().setHours(0,0,0,0) && cs.reps > 0
  ).length;
  if (overdueCount > 0) {
    setTimeout(() => showToast(`期限超過カードが ${overdueCount} 枚あります`, 'warning'), 500);
  }
})();
</script>
